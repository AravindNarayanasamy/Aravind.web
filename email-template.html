<style>
  @media only screen and (max-width: 480px) {
    .template-container {
      padding: 20px 15px !important;
      border-radius: 6px !important;
    }
    .flex-layout {
      display: block !important;
    }
    .avatar-cell {
      display: block !important;
      width: 100% !important;
      text-align: center !important;
      margin-bottom: 15px !important;
    }
    .avatar-wrapper {
      margin: 0 auto !important;
    }
    .details-cell {
      display: block !important;
      width: 100% !important;
      padding-left: 0 !important;
    }
    .meta-row {
      display: block !important;
    }
    .meta-label, .meta-value {
      display: block !important;
      width: 100% !important;
      text-align: left !important;
      padding: 2px 0 !important;
    }
    .meta-label {
      font-weight: bold !important;
      color: aqua !important;
    }
  }
</style>

<div class="template-container" style="font-family: 'Poppins', 'Raleway', sans-serif; font-size: 14px; line-height: 1.6; background-color: #020e28; color: #ffffff; max-width: 600px; margin: 0 auto; padding: 30px; border: 2px solid aqua; border-radius: 12px; box-shadow: 0px 10px 30px rgba(0, 255, 255, 0.1);">
  
  <!-- Header Title -->
  <div style="text-align: center; border-bottom: 2px solid aqua; padding-bottom: 15px; margin-bottom: 25px;">
    <h2 style="margin: 0; font-size: 22px; font-weight: 700; color: aqua; text-transform: uppercase; letter-spacing: 2px;">
      New Contact Inquiry
    </h2>
    <span style="font-size: 12px; color: rgba(255, 255, 255, 0.6);">Aravind N - Web Developer Portfolio</span>
  </div>

  <div style="font-size: 15px; margin-bottom: 20px; color: #ffffff;">
    A message by <strong>{{name}}</strong> has been received. Kindly respond at your earliest convenience.
  </div>

  <!-- Main Info Card -->
  <div style="background: rgba(255, 255, 255, 0.05); padding: 25px; border-radius: 8px; border-left: 4px solid aqua; margin-bottom: 25px;">
    <table role="presentation" style="width: 100%; border-collapse: collapse;">
      <tr class="flex-layout">
        <td class="avatar-cell" style="vertical-align: top; width: 60px;">
          <!-- Avatar matching contact icon style -->
          <div class="avatar-wrapper" style="padding: 10px; background: rgba(0, 255, 255, 0.1); border: 1px solid aqua; border-radius: 50%; font-size: 26px; text-align: center; width: 42px; height: 42px; line-height: 42px; color: aqua;">
            👤
          </div>
        </td>
        <td class="details-cell" style="vertical-align: top; padding-left: 20px;">
          <div style="font-size: 18px; font-weight: 700; color: aqua; margin-bottom: 2px;">
            {{name}}
          </div>
          <div style="color: rgba(255, 255, 255, 0.5); font-size: 12px; margin-bottom: 20px;">
            Sent on: {{time}}
          </div>
          
          <!-- Field Grid -->
          <table role="presentation" style="width: 100%; font-size: 14px; color: #ffffff; border-collapse: collapse; margin-bottom: 15px;">
            <tr class="meta-row">
              <td class="meta-label" style="padding: 6px 0; font-weight: 600; width: 100px; color: rgba(255, 255, 255, 0.6);">Email:</td>
              <td class="meta-value" style="padding: 6px 0;"><a href="mailto:{{email}}" style="color: aqua; text-decoration: none; border-bottom: 1px dashed aqua;">{{email}}</a></td>
            </tr>
            <tr class="meta-row">
              <td class="meta-label" style="padding: 6px 0; font-weight: 600; color: rgba(255, 255, 255, 0.6);">Company:</td>
              <td class="meta-value" style="padding: 6px 0; color: #ffffff;">{{company}}</td>
            </tr>
            <tr class="meta-row">
              <td class="meta-label" style="padding: 6px 0; font-weight: 600; color: rgba(255, 255, 255, 0.6);">Subject:</td>
              <td class="meta-value" style="padding: 6px 0; color: #ffffff; font-weight: bold;">{{subject}}</td>
            </tr>
          </table>
        </td>
      </tr>
    </table>

    <!-- Message Area -->
    <div style="margin-top: 20px; padding-top: 15px; border-top: 1px solid rgba(255, 255, 255, 0.1);">
      <div style="font-size: 12px; font-weight: 600; color: aqua; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 8px;">
        Message Content:
      </div>
      <div style="background: rgba(0, 0, 0, 0.3); padding: 15px; border-radius: 6px; border: 1px solid rgba(255, 255, 255, 0.05); font-size: 14px; color: #ffffff; white-space: pre-wrap;">
        {{message}}
      </div>
    </div>
  </div>

  <!-- Footer -->
  <div style="text-align: center; font-size: 11px; color: rgba(255, 255, 255, 0.4); margin-top: 20px;">
    Designed by <a href="#" style="color: aqua; text-decoration: none;">Aravind N</a>
  </div>
</div>
